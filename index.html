<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Simran ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: 'Poppins', sans-serif;
  text-align: center;
  background: linear-gradient(to right, #ffdde1, #ee9ca7);
}

/* Center content */
.container {
  margin-top: 100px;
}

/* Text */
h1 {
  color: white;
}

p {
  color: white;
  font-size: 18px;
}

/* Button */
button {
  background: white;
  color: #ff4d6d;
  border: none;
  padding: 10px 20px;
  border-radius: 20px;
  cursor: pointer;
}

/* Floating hearts */
.heart {
  position: absolute;
  color: red;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-600px); opacity: 0; }
}
</style>

</head>

<body>

<div class="container">
  <h1>Hey Simran ❤️</h1>

  <p>I didn’t know how to say this directly...</p>
  <p>But you became special to me 💖</p>

  <button onclick="showLove()">Click me</button>
</div>

<script>
function showLove() {
  alert("I like you a lot ❤️");
}

function createHeart() {
  let heart = document.createElement("div");
  heart.innerHTML = "❤️";
  heart.classList.add("heart");

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 20) + "px";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
