<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: 'Poppins', sans-serif;
  text-align: center;
  background: linear-gradient(to right, #ffdde1, #ee9ca7);
  overflow: hidden;
}

/* Center content */
.container {
  position: relative;
  top: 20%;
}

/* Text styling */
h1 {
  font-size: 40px;
  color: #fff;
}

p {
  font-size: 18px;
  color: #fff;
}

/* Button */
button {
  background: white;
  color: #ff4d6d;
  border: none;
  padding: 12px 25px;
  font-size: 16px;
  border-radius: 25px;
  cursor: pointer;
  margin-top: 20px;
}

/* Floating hearts */
.heart {
  position: absolute;
  color: red;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  0% {
    transform: translateY(0);
    opacity: 1;
  }
  100% {
    transform: translateY(-800px);
    opacity: 0;
  }
}

/* Balloons */
.balloon {
  position: absolute;
  bottom: -100px;
  width: 50px;
  height: 70px;
  background: pink;
  border-radius: 50%;
  animation: rise 10s infinite ease-in;
}

@keyframes rise {
  0% { bottom: -100px; }
  100% { bottom: 100%; }
}

</style>
</head>

<body>

<div class="container">
  <h1>Hey Simran ❤️</h1>
  <p>You became special without me even realizing it...</p>
  <p>I genuinely love having you in my life 💖</p>

  <button onclick="showLove()">Click Me</button>
</div>

<!-- Balloons -->
<div class="balloon" style="left:10%; animation-delay:0s;"></div>
<div class="balloon" style="left:30%; animation-delay:2s;"></div>
<div class="balloon" style="left:50%; animation-delay:4s;"></div>
<div class="balloon" style="left:70%; animation-delay:1s;"></div>
<div class="balloon" style="left:90%; animation-delay:3s;"></div>

<script>

/* Hearts animation */
function createHeart() {
  let heart = document.createElement("div");
  heart.innerHTML = "❤️";
  heart.classList.add("heart");

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 20) + "px";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 300);

/* Button effect */
function showLove() {
  alert("I like you... a lot ❤️");
}

</script>

</body>
</html>
