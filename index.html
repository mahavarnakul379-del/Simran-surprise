<!DOCTYPE html>
<html>
<head>
<title>For Simran 🤍</title>
<style>
body {
  background: linear-gradient(to right, #fceff9, #e0f7fa);
  font-family: Arial;
  text-align: center;
  padding: 50px;
}
#msg {
  font-size: 20px;
  max-width: 600px;
  margin: auto;
}
button {
  margin-top: 30px;
  padding: 10px 20px;
  border: none;
  background: #444;
  color: white;
  border-radius: 20px;
}
#hidden {
  display: none;
  margin-top: 20px;
  font-size: 18px;
}
</style>
</head>

<body>

<div id="msg">
Hey Simran (schatzi 🤍🌼),<br><br>
I didn’t really know how to say this directly…<br>
so I thought I’d make something instead.<br><br>

Somewhere between random conversations,<br>
you quietly became important to me.<br><br>

I genuinely like having you in my life. 🤍
</div>

<button onclick="showMsg()">Click me</button>

<div id="hidden">
Also… you crossed my mind while I was making this. 🤍
</div>

<script>
function showMsg() {
  document.getElementById("hidden").style.display = "block";
}
</script>

</body>
</html>
